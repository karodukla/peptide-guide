/* ── useIsMobile hook ─────────────────────────────────── */
function useIsMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth <= 640);
  useEffect(() => {
    const handler = () => setMobile(window.innerWidth <= 640);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return mobile;
}

              ))}

      </div>
    </div>
  );
}

        {/* Background grid */}
        <div style={{
          position: "absolute", inset: 0,
          backgroundImage: `linear-gradient(rgba(200,153,42,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(200,153,42,0.03) 1px, transparent 1px)`,
          backgroundSize: "40px 40px",
          pointerEvents: "none",
        }} />
        <div style={{ position: "relative" }}>
          <div style={{
            display: "inline-block",
            fontFamily: "'DM Mono', monospace",
            fontSize: 10,
            letterSpacing: "0.2em",
            textTransform: "uppercase",
            color: "var(--gold-500)",
            background: "rgba(200,153,42,0.08)",
            border: "1px solid rgba(200,153,42,0.18)",
            padding: "5px 14px",
            borderRadius: 4,
            marginBottom: 16,
          }}>
            Clinical Peptide Reference — v2026.1
          </div>
          <h1 style={{
            fontFamily: "'Playfair Display', serif",
            fontSize: "clamp(30px, 5vw, 50px)",
            fontWeight: 600,
            color: "var(--white)",
            letterSpacing: "-0.01em",
            lineHeight: 1.1,
            marginBottom: 10,
          }}>
            Peptide Reference Guide
          </h1>
          <p style={{
            fontSize: "clamp(13px, 2.5vw, 15px)",
            color: "var(--text-secondary)",
            maxWidth: 520,
            margin: "0 auto 20px",
            lineHeight: 1.6,
            padding: "0 8px",
          }}>
            Comprehensive dosing, mechanisms, and protocols for therapeutic peptides.
          </p>

          {/* Main nav tabs */}
          <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 24, flexWrap: "wrap", padding: "0 16px" }}>
            {[
              { id: "reference", label: "Peptide Reference" },
              { id: "stacking",  label: "Stacking & Timing" },
            ].map(tab => (
              <button key={tab.id} onClick={() => setMainTab(tab.id)} style={{
                padding: "9px 22px",
                borderRadius: 99,
                border: mainTab === tab.id
                  ? "1.5px solid rgba(200,153,42,0.5)"
                  : "1.5px solid rgba(255,255,255,0.1)",
                background: mainTab === tab.id
                  ? "rgba(200,153,42,0.14)"
                  : "rgba(255,255,255,0.03)",
                color: mainTab === tab.id ? "var(--gold-300)" : "var(--text-secondary)",
                fontFamily: "'DM Sans', sans-serif",
                fontSize: 14,
                fontWeight: mainTab === tab.id ? 600 : 400,
                cursor: "pointer",
                transition: "all 0.18s",
              }}>{tab.label}</button>
            ))}
          </div>

          {/* Search & filters — only on reference tab */}
          {mainTab === "reference" && (<>
            <div style={{ maxWidth: 400, margin: "0 auto 24px", position: "relative", padding: "0 16px" }}>
              <div style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", color: "var(--text-muted)", fontSize: 14, pointerEvents: "none" }}>⌕</div>
              <input
                type="text"
                value={search}
                onChange={e => setSearch(e.target.value)}
                placeholder="Search peptides..."
                style={{
                  width: "100%",
                  padding: "10px 14px 10px 36px",
                  background: "rgba(255,255,255,0.05)",
                  border: "1px solid rgba(255,255,255,0.1)",
                  borderRadius: 10,
                  color: "var(--text-primary)",
                  fontSize: 14,
                  fontFamily: "'DM Sans', sans-serif",
                  outline: "none",
                }}
              />
            </div>
            <div style={{ padding: "0 0 32px" }}>
              <FilterBar active={activeFilter} onChange={setActiveFilter} />
            </div>
          </>)}

          {/* Stacking tab — just bottom padding */}
          {mainTab === "stacking" && <div style={{ paddingBottom: 32 }} />}
        </div>
      </header>

      {/* Cancer disclaimer banner */}
      {mainTab === "reference" && <CancerDisclaimerBanner />}

      {/* Reference grid */}
      {mainTab === "reference" && (
        <main style={{ flex: 1, padding: "36px max(24px, calc((100vw - 1200px) / 2))" }}>
          {filtered.length === 0 ? (
            <div style={{ textAlign: "center", color: "var(--text-muted)", padding: "60px 0", fontSize: 15 }}>
              No peptides found.
            </div>
          ) : (
            <div className="card-grid" style={{
              display: "grid",
              gridTemplateColumns: `repeat(${colCount}, minmax(0, 1fr))`,
              gap: 20,
            }}>
              {filtered.map(p => (
                <PeptideCard
                  key={p.id}
                  peptide={p}
                  onClick={() => setSelectedPeptide(p)}
                />
              ))}
            </div>
          )}
          <div style={{ marginTop: 48, textAlign: "center", fontSize: 11.5, color: "var(--text-muted)", lineHeight: 1.8, maxWidth: 640, margin: "48px auto 0" }}>
            ⚠️ For educational and informational purposes only. Consult a licensed healthcare provider before using any peptide.
            All dosages are general references and not individualized medical advice.
          </div>
        </main>
      )}

      {/* Stacking guide */}
      {mainTab === "stacking" && (
        <main style={{ flex: 1 }}>
          <StackingGuide />
          <div style={{ textAlign: "center", fontSize: 11.5, color: "var(--text-muted)", lineHeight: 1.8, maxWidth: 640, margin: "0 auto 48px", padding: "0 24px" }}>
            ⚠️ For educational and informational purposes only. Consult a licensed healthcare provider before using any peptide.
          </div>
        </main>
      )}

      {/* Modals */}
      {selectedPeptide && (
        <PeptideModal peptide={selectedPeptide} onClose={() => setSelectedPeptide(null)} />
      )}
      {showCompare && (
        <CompareModal peptideIds={compareIds} peptides={PEPTIDES} onClose={() => setShowCompare(false)} />
      )}

      {/* Compare tray */}
      <ComparisonTray
        selected={compareIds}
        peptides={PEPTIDES}
        onRemove={toggleCompare}
        onClear={() => setCompareIds([])}
        onCompare={() => setShowCompare(true)}
      />

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection label="Layout" />
        <TweakRadio
          label="Columns"
          value={tweaks.cardColumns}
          options={["2", "3", "4"]}
          onChange={v => setTweak("cardColumns", v)}
        />
        <TweakSection label="Display" />
        <TweakToggle
          label="Show taglines"
          value={tweaks.showTagline}
          onChange={v => setTweak("showTagline", v)}
        />
        <TweakToggle
          label="Show half-life"
          value={tweaks.showHalfLife}
          onChange={v => setTweak("showHalfLife", v)}
        />
        <TweakSection label="Colors" />
        <TweakColor
          label="Gold accent"
          value={tweaks.accentGold}
          onChange={v => setTweak("accentGold", v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<style>
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

  input::placeholder { color: var(--text-muted); }
  input:focus { border-color: rgba(200,153,42,0.3) !important; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy-900); }
  ::-webkit-scrollbar-thumb { background: var(--navy-600); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--navy-400); }
</style>
</body>
</html>
